<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mano Profilis</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div id="toast-container"></div>
    <div class="container">
        <div id="loader" class="text-center" style="padding: 50px;">Kraunama...</div>
        <div class="card" id="profile-content" style="display: none; max-width: 600px; margin: 0 auto;">
            <h2 class="text-center" style="margin-bottom: 20px;">Mano Profilis</h2>
            <div class="text-center" style="margin-bottom: 30px;">
                <div id="avatar-placeholder" style="width: 100px; height: 100px; border-radius: 50%; background-color: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto; font-weight: bold; box-shadow: var(--shadow);"></div>
            </div>
            <form id="profile-form">
                <div class="input-group">
                    <label for="profile-name">Vardas</label>
                    <input type="text" id="profile-name" required>
                </div>
                <div class="input-group">
                    <label for="profile-email">El. paštas (nekeičiamas)</label>
                    <input type="email" id="profile-email" disabled>
                </div>
                <div class="input-group">
                    <label for="profile-role">Sistemos rolė</label>
                    <input type="text" id="profile-role" disabled style="text-transform: uppercase;">
                </div>
                <button type="submit" class="btn" id="save-btn" style="width: 100%; margin-top: 10px;">Išsaugoti pakeitimus</button>
            </form>
        </div>
    </div>
    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="assets/js/profile.js"></script>
</body>
</html>
