<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracija</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h2 class="text-center" style="margin-bottom: 20px;">Registracija</h2>
            <form id="register-form">
                <div class="input-group">
                    <input type="text" id="name" placeholder="Vardas" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="El. paštas" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Slaptažodis" required minlength="6">
                </div>
                <button type="submit" class="btn" id="register-btn" style="width: 100%;">Registruotis</button>
            </form>
            <p class="text-center" style="margin-top: 20px;">
                Jau turite paskyrą? <a href="login.html" style="color: var(--primary-color);">Prisijungti</a>
            </p>
        </div>
    </div>
    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
