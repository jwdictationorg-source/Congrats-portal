<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracija | Bendruomenės Portalas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card" style="width: 100%; max-width: 420px; padding: 40px;">
            <h2 class="text-center" style="margin-bottom: 30px; font-size: 28px;">Sukurti paskyrą</h2>
            
            <form id="register-form">
                <div class="input-group">
                    <label for="name">Vardas ir Pavardė</label>
                    <input type="text" id="name" placeholder="Jonas Jonaitis" required>
                </div>
                <div class="input-group">
                    <label for="email">El. paštas</label>
                    <input type="email" id="email" placeholder="vardas@pavyzdys.lt" required>
                </div>
                <div class="input-group">
                    <label for="password">Slaptažodis</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn" id="register-btn" style="width: 100%; margin-top: 10px;">Registruotis</button>
            </form>

            <div style="display: flex; align-items: center; margin: 30px 0;">
                <div style="flex: 1; height: 1px; background-color: var(--border-color);"></div>
                <span style="padding: 0 15px; color: var(--text-secondary); font-size: 14px; font-weight: 500;">arba tęsti su</span>
                <div style="flex: 1; height: 1px; background-color: var(--border-color);"></div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button type="button" class="btn btn-outline" id="google-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #ffffff; color: #333; border-color: #d1d5db;">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google
                </button>
                <button type="button" class="btn" id="apple-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #000000; color: #ffffff; border: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.15 2.95.97 3.67 2.14-3.41 1.96-2.82 6.47.59 7.76-.71 1.53-1.58 3.11-2.91 4.11zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    Apple
                </button>
            </div>

            <p class="text-center" style="margin-top: 30px; color: var(--text-secondary);">
                Jau turite paskyrą? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Prisijungti</a>
            </p>
        </div>
    </div>
    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
