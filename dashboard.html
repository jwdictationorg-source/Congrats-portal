<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabinetas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div id="toast-container"></div>
    <div class="container">
        <div id="loader" class="text-center" style="padding: 50px;">Kraunama...</div>
        <div class="card" id="dashboard-content" style="display: none;">
            <h1>Sveiki, <span id="user-name"></span>!</h1>
            <p style="margin-top: 10px;">Jūsų el. paštas: <span id="user-email"></span></p>
            <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                <a href="profile.html" class="btn btn-outline">Profilis</a>
                <a href="settings.html" class="btn btn-outline">Nustatymai</a>
                <a href="admin.html" class="btn" id="admin-link" style="display: none;">Admin Panelė</a>
                <button class="btn" id="logout-btn" style="background-color: var(--error-color);">Atsijungti</button>
            </div>
        </div>
    </div>
    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
