<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisijungti</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h2 class="text-center" style="margin-bottom: 20px;">Prisijungti</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="El. paštas" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Slaptažodis" required>
                </div>
                <button type="submit" class="btn" id="login-btn" style="width: 100%;">Prisijungti</button>
            </form>
            <div class="text-center" style="margin: 20px 0;">arba</div>
            <button class="btn" id="google-btn" style="width: 100%; background-color: #db4437;">Prisijungti su Google</button>
            <p class="text-center" style="margin-top: 20px;">
                Neturite paskyros? <a href="register.html" style="color: var(--primary-color);">Registruotis</a>
            </p>
        </div>
    </div>
    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
